image:
  tag: "1.0.0"
  repository: europe-north1-docker.pkg.dev/nais-io/nais/images/clamav-rest 
  pullPolicy: IfNotPresent
maxFileSize: 400
enabled: false

containerSecurityContext:
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
