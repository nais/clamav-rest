apiVersion: v1
kind: Service
metadata:
  name: {{ include "clamav-rest.fullname" . }}
  labels:
    {{- include "clamav-rest.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
  selector:
    {{- include "clamav-rest.selectorLabels" . | nindent 4 }}
  sessionAffinity: None
  type: ClusterIP
